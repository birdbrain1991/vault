<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VAULT</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --cyan: #00e5ff;
  --pink: #ff2d9b;
  --red: #ff1a1a;
  --gold: #b0c020;
  --gold-dim: rgba(176,192,32,0.15);
  --metal-dark: #2a3545;
  --metal-mid: #7a8fa8;
  --metal-light: #b8cce0;
  --bg: #040a0e;
}

body {
  background: var(--bg);
  color: white;
  font-family: 'Share Tech Mono', monospace;
  overflow: hidden;
  height: 100vh;
  width: 100vw;
}

/* ==============================
   GLOBAL SCANLINES
============================== */
#scanlines {
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 3px,
    rgba(0,0,0,0.12) 3px,
    rgba(0,0,0,0.12) 4px
  );
  pointer-events: none;
  z-index: 9999;
}

/* ==============================
   SCENE WRAPPER
============================== */
#scene {
  position: relative;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
}

/* ==============================
   VAULT DOOR SCREEN
============================== */
#vault-screen {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 10;
  will-change: transform, opacity;
  transition: transform 1.8s cubic-bezier(0.4,0,0.2,1), opacity 1.2s ease-in;
}

#vault-screen.zooming {
  transform: scale(5);
  opacity: 0;
  pointer-events: none;
}

/* Brushed metal wall */
#vault-screen::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    repeating-linear-gradient(0deg, transparent, transparent 5px, rgba(255,255,255,0.008) 5px, rgba(255,255,255,0.008) 6px),
    linear-gradient(160deg, #0c1825 0%, #0a1520 40%, #060e18 100%);
  z-index: -1;
}

/* ==============================
   DOOR CONTAINER
============================== */
#door-container {
  position: relative;
  width: min(440px, 82vmin);
  height: min(440px, 82vmin);
  cursor: pointer;
  perspective: 1400px;
}

#door-svg-wrapper {
  width: 100%;
  height: 100%;
  transform-origin: 12% center;
  will-change: transform;
  transition: transform 1.4s cubic-bezier(0.6,0.04,0.98,0.34);
}

#door-svg-wrapper.opening {
  transform: perspective(1400px) rotateY(-115deg);
}

/* ==============================
   ALARM STATE
============================== */
#door-container.alarm-active .alarm-overlay {
  animation: alarmFlash 0.35s ease-in-out infinite;
}

#door-container.alarm-active #wheel-group circle:first-child {
  animation: wheelAlarm 0.35s ease-in-out infinite;
}

.alarm-overlay {
  opacity: 0;
  pointer-events: none;
}

@keyframes alarmFlash {
  0%, 100% { opacity: 0.55; }
  50% { opacity: 0.05; }
}

@keyframes wheelAlarm {
  0%, 100% { stroke: var(--red); }
  50% { stroke: var(--metal-mid); }
}

/* ==============================
   WHEEL + BOLTS
============================== */
#wheel-group {
  transform-box: fill-box;
  transform-origin: center;
}

#wheel-group.spinning {
  animation: spinWheel 1.1s cubic-bezier(0.4,0,0.2,1) forwards;
}

@keyframes spinWheel {
  0%   { transform: rotate(0deg); }
  60%  { transform: rotate(390deg); }
  100% { transform: rotate(360deg); }
}

/* Bolt transitions */
.bolt-v, .bolt-h {
  transition: transform 0.9s cubic-bezier(0.4,0,0.2,1);
}

.bolt-top.retracted    { transform: translateY(28px); }
.bolt-bottom.retracted { transform: translateY(-28px); }
.bolt-right.retracted  { transform: translateX(-28px); }

/* Neon glow on door edge */
.door-edge-ring {
  filter: drop-shadow(0 0 5px var(--cyan)) drop-shadow(0 0 14px var(--cyan));
  opacity: 0.85;
  transition: filter 0.4s;
}

.door-pink-ring {
  filter: drop-shadow(0 0 4px var(--pink)) drop-shadow(0 0 10px var(--pink));
  opacity: 0.5;
}

/* ==============================
   CLICK HINT
============================== */
#click-hint {
  margin-top: 28px;
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px;
  letter-spacing: 5px;
  color: var(--cyan);
  animation: hintPulse 2.2s ease-in-out infinite;
}

@keyframes hintPulse {
  0%, 100% { opacity: 0.8; }
  50%       { opacity: 0.2; }
}

/* ==============================
   VAULT INTERIOR
============================== */
#vault-interior {
  position: absolute;
  inset: 0;
  z-index: 5;
  opacity: 0;
  pointer-events: none;
  transition: opacity 1.2s ease-out;
  overflow: hidden;
}

#vault-interior.visible {
  opacity: 1;
  pointer-events: all;
}

#room-bg {
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at 50% 30%, #0a1505 0%, #030805 60%, #020504 100%);
}

/* Gold-green ambient lights */
.amb {
  position: absolute;
  border-radius: 50%;
  background: var(--gold);
  filter: blur(80px);
  pointer-events: none;
}
.amb-1 { width: 320px; height: 260px; top: -80px; left: 15%; opacity: 0.11; }
.amb-2 { width: 220px; height: 180px; bottom: 5%;  right: 12%; opacity: 0.09; }
.amb-3 { width: 180px; height: 140px; top: 25%;   right: 22%; opacity: 0.07; }

/* Ceiling light beam */
.ceiling-beam {
  position: absolute;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 3px;
  height: 45%;
  background: linear-gradient(to bottom, transparent 0%, rgba(176,192,32,0.5) 70%, transparent 100%);
  filter: blur(2px);
}

.ceiling-beam::after {
  content: '';
  position: absolute;
  bottom: -10px;
  left: 50%;
  transform: translateX(-50%);
  width: 250px;
  height: 250px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(176,192,32,0.15) 0%, transparent 65%);
  filter: blur(25px);
}

/* Floor */
.floor {
  position: absolute;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 140%;
  height: 35%;
  background: linear-gradient(to top, #060e04 0%, #030805 100%);
  border-top: 1px solid rgba(176,192,32,0.18);
}

/* Floor grid */
.floor::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    repeating-linear-gradient(90deg, rgba(176,192,32,0.05) 0px, rgba(176,192,32,0.05) 1px, transparent 1px, transparent 60px),
    repeating-linear-gradient(0deg,  rgba(176,192,32,0.05) 0px, rgba(176,192,32,0.05) 1px, transparent 1px, transparent 40px);
}

/* Wall grid */
#room-bg::after {
  content: '';
  position: absolute;
  inset: 0;
  background:
    repeating-linear-gradient(90deg, rgba(176,192,32,0.025) 0px, rgba(176,192,32,0.025) 1px, transparent 1px, transparent 80px),
    repeating-linear-gradient(0deg,  rgba(176,192,32,0.025) 0px, rgba(176,192,32,0.025) 1px, transparent 1px, transparent 60px);
  pointer-events: none;
}

/* ==============================
   CRATES
============================== */
.crate {
  position: absolute;
  background: linear-gradient(145deg, #111808 0%, #080d04 100%);
  border: 1px solid rgba(176,192,32,0.18);
}

.crate::before {
  content: '';
  position: absolute;
  inset: 5px;
  border: 1px solid rgba(176,192,32,0.08);
}

/* Cross brace on crate */
.crate::after {
  content: '';
  position: absolute;
  inset: 0;
  background:
    linear-gradient(to bottom right, transparent calc(50% - 0.5px), rgba(176,192,32,0.08) calc(50% - 0.5px), rgba(176,192,32,0.08) calc(50% + 0.5px), transparent calc(50% + 0.5px)),
    linear-gradient(to bottom left,  transparent calc(50% - 0.5px), rgba(176,192,32,0.08) calc(50% - 0.5px), rgba(176,192,32,0.08) calc(50% + 0.5px), transparent calc(50% + 0.5px));
}

/* Corner glow on crates */
.crate-glow {
  box-shadow: 0 0 18px rgba(176,192,32,0.08), inset 0 0 15px rgba(176,192,32,0.04);
}

/* Positions */
.c1 { width: 85px;  height: 75px;  bottom: 35%; left: 6%; }
.c2 { width: 120px; height: 95px;  bottom: calc(35% + 75px); left: 4%; }
.c3 { width: 65px;  height: 65px;  bottom: 35%; left: 16%; }
.c4 { width: 55px;  height: 85px;  bottom: 35%; left: 13%; }
.c5 { width: 105px; height: 85px;  bottom: 35%; right: 7%; }
.c6 { width: 75px;  height: 115px; bottom: 35%; right: 4%; }
.c7 { width: 90px;  height: 70px;  bottom: 35%; right: 17%; }
.c8 { width: 60px;  height: 60px;  bottom: calc(35% + 85px); right: 9%; }

/* small indicator lights on random crates */
.crate-light {
  position: absolute;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--gold);
  top: 10px;
  right: 10px;
  box-shadow: 0 0 6px var(--gold), 0 0 12px rgba(176,192,32,0.5);
  animation: blinkLight 3s ease-in-out infinite;
}

@keyframes blinkLight {
  0%, 90%, 100% { opacity: 1; }
  95%           { opacity: 0.1; }
}

/* ==============================
   LOGO AREA
============================== */
#logo-area {
  position: absolute;
  top: 42%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  z-index: 30;
  opacity: 0;
  width: 100%;
}

#logo-text {
  font-family: 'Orbitron', monospace;
  font-size: clamp(32px, 7vw, 72px);
  font-weight: 900;
  color: var(--gold);
  letter-spacing: 8px;
  text-shadow: 0 0 20px var(--gold), 0 0 50px rgba(176,192,32,0.4);
  position: relative;
  display: inline-block;
}

#logo-sub {
  font-family: 'Share Tech Mono', monospace;
  font-size: clamp(9px, 1.4vw, 13px);
  letter-spacing: 7px;
  color: rgba(176,192,32,0.55);
  margin-top: 10px;
  text-transform: uppercase;
}

/* Glitch in */
#logo-area.glitch-in {
  animation: glitchIn 1.8s cubic-bezier(0.4,0,0.2,1) forwards;
}

@keyframes glitchIn {
  0%   { opacity:0; clip-path:inset(50% 0 50% 0); transform:translate(-50%,-50%); }
  8%   { opacity:1; clip-path:inset(30% 0 40% 0); transform:translate(calc(-50% + 12px),-50%); filter:hue-rotate(80deg) brightness(2); }
  16%  { clip-path:inset(0 0 0 0);                 transform:translate(calc(-50% - 8px),-50%); filter:none; }
  24%  { clip-path:inset(15% 0 25% 0);             transform:translate(calc(-50% + 5px),-50%); filter:hue-rotate(120deg); }
  32%  { clip-path:inset(0 0 0 0);                 transform:translate(-50%,-50%); filter:none; }
  40%  { opacity:0; }
  50%  { opacity:1; clip-path:inset(8% 0 5% 0);   transform:translate(calc(-50% + 3px),-50%); }
  60%  { clip-path:inset(0 0 0 0);                 transform:translate(-50%,-50%); }
  75%, 100% { opacity:1; clip-path:inset(0 0 0 0); transform:translate(-50%,-50%); filter:none; }
}

/* Glitch out */
#logo-area.glitch-out {
  animation: glitchOut 1s cubic-bezier(0.4,0,0.2,1) forwards;
}

@keyframes glitchOut {
  0%   { opacity:1; clip-path:inset(0 0 0 0);       transform:translate(-50%,-50%); }
  15%  { clip-path:inset(25% 0 35% 0);              transform:translate(calc(-50% + 15px),-50%); filter:hue-rotate(180deg) brightness(2); }
  30%  { clip-path:inset(0 0 70% 0);                transform:translate(calc(-50% - 10px),-50%); filter:none; }
  50%  { opacity:1; clip-path:inset(55% 0 0% 0);   transform:translate(calc(-50% + 6px),-50%); }
  70%  { opacity:0; clip-path:inset(50% 0 50% 0); }
  100% { opacity:0; }
}

/* ==============================
   SERIES NAV
============================== */
#series-nav {
  position: absolute;
  bottom: 10%;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: clamp(16px, 3vw, 48px);
  z-index: 30;
  opacity: 0;
}

#series-nav.visible {
  animation: navIn 1.2s cubic-bezier(0.4,0,0.2,1) forwards;
}

@keyframes navIn {
  from { opacity:0; transform:translateX(-50%) translateY(40px); }
  to   { opacity:1; transform:translateX(-50%) translateY(0); }
}

.series-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  text-decoration: none;
  cursor: pointer;
  transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
}

.series-item:nth-child(1) { animation-delay: 0.1s; }
.series-item:nth-child(2) { animation-delay: 0.3s; }
.series-item:nth-child(3) { animation-delay: 0.5s; }

.series-item:hover { transform: translateY(-8px); }

.series-box {
  width: clamp(90px, 14vw, 130px);
  height: clamp(90px, 14vw, 130px);
  border: 1px solid rgba(176,192,32,0.35);
  background: rgba(176,192,32,0.04);
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  transition: border-color 0.3s, box-shadow 0.3s;
}

.series-item:hover .series-box {
  border-color: var(--gold);
  box-shadow: 0 0 25px rgba(176,192,32,0.25), inset 0 0 25px rgba(176,192,32,0.06);
}

/* Corner brackets */
.series-box::before,
.series-box::after {
  content: '';
  position: absolute;
  width: 14px;
  height: 14px;
  border-color: var(--gold);
  border-style: solid;
  opacity: 0.55;
  transition: opacity 0.3s;
}
.series-box::before { top: -1px; left: -1px;  border-width: 2px 0 0 2px; }
.series-box::after  { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }
.series-item:hover .series-box::before,
.series-item:hover .series-box::after { opacity: 1; }

.series-placeholder {
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
  letter-spacing: 2px;
  color: rgba(176,192,32,0.28);
  text-align: center;
  line-height: 1.8;
}

.series-label {
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  letter-spacing: 4px;
  color: rgba(176,192,32,0.65);
  text-transform: uppercase;
}

/* ==============================
   STATUS TICKER (top of vault)
============================== */
#status-bar {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  padding: 10px 20px;
  font-size: 10px;
  letter-spacing: 3px;
  color: rgba(176,192,32,0.4);
  z-index: 31;
  display: flex;
  justify-content: space-between;
  opacity: 0;
  transition: opacity 1s ease-out 1s;
}

#status-bar.visible { opacity: 1; }

</style>
</head>
<body>

<div id="scanlines"></div>

<div id="scene">

  <!-- ===== VAULT DOOR ===== -->
  <div id="vault-screen">
    <div id="door-container">
      <div id="door-svg-wrapper">
        <svg id="vault-svg" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="wallGrad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%"   stop-color="#1a2838"/>
              <stop offset="50%"  stop-color="#253345"/>
              <stop offset="100%" stop-color="#131e2c"/>
            </linearGradient>

            <radialGradient id="doorFace" cx="38%" cy="33%" r="68%">
              <stop offset="0%"   stop-color="#c0d5ea"/>
              <stop offset="35%"  stop-color="#8098b5"/>
              <stop offset="100%" stop-color="#384858"/>
            </radialGradient>

            <linearGradient id="metalFrame" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%"   stop-color="#7a8fa8"/>
              <stop offset="45%"  stop-color="#9ab2cc"/>
              <stop offset="100%" stop-color="#4a5e72"/>
            </linearGradient>

            <linearGradient id="metalBolt" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%"   stop-color="#6a7e96"/>
              <stop offset="50%"  stop-color="#8daac5"/>
              <stop offset="100%" stop-color="#3a4e60"/>
            </linearGradient>

            <radialGradient id="wheelFace" cx="38%" cy="35%" r="62%">
              <stop offset="0%"   stop-color="#7a8fa8"/>
              <stop offset="100%" stop-color="#202e3c"/>
            </radialGradient>

            <!-- Red alarm overlay filter -->
            <filter id="redGlow">
              <feGaussianBlur stdDeviation="6" result="blur"/>
              <feComposite in="SourceGraphic" in2="blur" operator="over"/>
            </filter>
          </defs>

          <!-- WALL BACKGROUND -->
          <rect width="400" height="400" fill="url(#wallGrad)"/>

          <!-- Subtle brushed lines -->
          <g opacity="0.04" stroke="white" stroke-width="1">
            <line x1="0" y1="80"  x2="400" y2="80"/>
            <line x1="0" y1="160" x2="400" y2="160"/>
            <line x1="0" y1="240" x2="400" y2="240"/>
            <line x1="0" y1="320" x2="400" y2="320"/>
          </g>

          <!-- OUTER FRAME -->
          <rect x="52" y="30" width="296" height="340" rx="9" fill="url(#metalFrame)" stroke="#1a2838" stroke-width="2.5"/>
          <!-- Frame bevel inner -->
          <rect x="68" y="46" width="264" height="308" rx="6" fill="none" stroke="rgba(180,210,230,0.12)" stroke-width="1.5"/>
          <!-- Frame shadow inner -->
          <rect x="70" y="48" width="260" height="304" rx="5" fill="none" stroke="rgba(0,0,0,0.35)" stroke-width="2"/>

          <!-- BOLT TRACKS (static part of frame, holes bolts slide through) -->
          <!-- Top -->
          <rect x="170" y="30" width="60" height="38" fill="url(#metalFrame)" stroke="#1a2838" stroke-width="1.5"/>
          <rect x="177" y="34" width="46" height="28" rx="2" fill="#1a2838" opacity="0.5"/>
          <!-- Bottom -->
          <rect x="170" y="332" width="60" height="38" fill="url(#metalFrame)" stroke="#1a2838" stroke-width="1.5"/>
          <rect x="177" y="334" width="46" height="28" rx="2" fill="#1a2838" opacity="0.5"/>
          <!-- Right -->
          <rect x="330" y="170" width="38" height="60" fill="url(#metalFrame)" stroke="#1a2838" stroke-width="1.5"/>
          <rect x="332" y="177" width="28" height="46" rx="2" fill="#1a2838" opacity="0.5"/>

          <!-- MOVING BOLTS -->
          <g class="bolt-top bolt-v">
            <rect x="176" y="33" width="48" height="33" rx="3" fill="url(#metalBolt)" stroke="#5a7088" stroke-width="1.5"/>
            <rect x="183" y="39" width="34" height="6"  rx="1.5" fill="rgba(0,0,0,0.3)"/>
            <rect x="183" y="49" width="34" height="6"  rx="1.5" fill="rgba(0,0,0,0.3)"/>
            <!-- highlight -->
            <rect x="176" y="33" width="48" height="6" rx="3" fill="rgba(255,255,255,0.12)"/>
          </g>

          <g class="bolt-bottom bolt-v">
            <rect x="176" y="334" width="48" height="33" rx="3" fill="url(#metalBolt)" stroke="#5a7088" stroke-width="1.5"/>
            <rect x="183" y="340" width="34" height="6"  rx="1.5" fill="rgba(0,0,0,0.3)"/>
            <rect x="183" y="350" width="34" height="6"  rx="1.5" fill="rgba(0,0,0,0.3)"/>
            <rect x="176" y="334" width="48" height="6" rx="3" fill="rgba(255,255,255,0.12)"/>
          </g>

          <g class="bolt-right bolt-h">
            <rect x="332" y="176" width="33" height="48" rx="3" fill="url(#metalBolt)" stroke="#5a7088" stroke-width="1.5"/>
            <rect x="338" y="183" width="6" height="34" rx="1.5" fill="rgba(0,0,0,0.3)"/>
            <rect x="348" y="183" width="6" height="34" rx="1.5" fill="rgba(0,0,0,0.3)"/>
            <rect x="332" y="176" width="6" height="48" rx="3" fill="rgba(255,255,255,0.12)"/>
          </g>

          <!-- HINGES (left side) -->
          <g fill="url(#metalFrame)" stroke="#1a2838" stroke-width="1.5">
            <rect x="42" y="105" width="40" height="60" rx="5"/>
            <rect x="42" y="235" width="40" height="60" rx="5"/>
          </g>
          <!-- Hinge pins -->
          <g fill="#1a2838" stroke="#4a6278" stroke-width="1.5">
            <circle cx="62" cy="118" r="7"/>
            <circle cx="62" cy="152" r="7"/>
            <circle cx="62" cy="248" r="7"/>
            <circle cx="62" cy="282" r="7"/>
          </g>
          <g fill="#6a8098">
            <circle cx="62" cy="118" r="3"/>
            <circle cx="62" cy="152" r="3"/>
            <circle cx="62" cy="248" r="3"/>
            <circle cx="62" cy="282" r="3"/>
          </g>

          <!-- MAIN DOOR CIRCLE -->
          <!-- Shadow behind door -->
          <circle cx="202" cy="202" r="146" fill="rgba(0,0,0,0.4)"/>
          <!-- Door face -->
          <circle cx="200" cy="200" r="145" fill="url(#doorFace)" stroke="#2a3848" stroke-width="7"/>
          <!-- Edge highlight top-left -->
          <circle cx="200" cy="200" r="148" fill="none" stroke="rgba(255,255,255,0.14)" stroke-width="2"/>
          <!-- Edge shadow -->
          <circle cx="200" cy="200" r="141" fill="none" stroke="rgba(0,0,0,0.4)" stroke-width="3"/>

          <!-- Subtle concentric ring detail -->
          <circle cx="200" cy="200" r="110" fill="none" stroke="rgba(100,140,180,0.2)" stroke-width="2.5"/>
          <circle cx="200" cy="200" r="68"  fill="none" stroke="rgba(80,120,160,0.2)"  stroke-width="2"/>

          <!-- RIVETS around the door (12 total, evenly placed at r=132) -->
          <g fill="#3a4e62" stroke="#6a8098" stroke-width="1.2">
            <circle cx="200" cy="68"  r="6.5"/>
            <circle cx="266" cy="86"  r="6.5"/>
            <circle cx="314" cy="134" r="6.5"/>
            <circle cx="332" cy="200" r="6.5"/>
            <circle cx="314" cy="266" r="6.5"/>

<script>
  // Set timestamp
  document.getElementById('ts').textContent = new Date().toISOString().slice(0,19).replace('T',' ');

  const doorContainer  = document.getElementById('door-container');
  const doorWrapper    = document.getElementById('door-svg-wrapper');
  const vaultScreen    = document.getElementById('vault-screen');
  const vaultInterior  = document.getElementById('vault-interior');
  const wheelGroup     = document.getElementById('wheel-group');
  const boltTop        = document.querySelector('.bolt-top');
  const boltBottom     = document.querySelector('.bolt-bottom');
  const boltRight      = document.querySelector('.bolt-right');
  const logoArea       = document.getElementById('logo-area');
  const seriesNav      = document.getElementById('series-nav');
  const statusBar      = document.getElementById('status-bar');
  const clickHint      = document.getElementById('click-hint');
  const alarmOverlay   = document.querySelector('.alarm-overlay');

  let activated = false;

  function t(fn, ms) { return setTimeout(fn, ms); }

  doorContainer.addEventListener('click', () => {
    if (activated) return;
    activated = true;

    clickHint.style.display = 'none';

    // ── Step 1: RED ALARM (0ms) ──
    doorContainer.classList.add('alarm-active');

    // ── Step 2: Stop alarm, begin unlock (1300ms) ──
    t(() => {
      doorContainer.classList.remove('alarm-active');
      alarmOverlay.style.opacity = '0';

      // Wheel spin
      wheelGroup.classList.add('spinning');

      // Bolts retract slightly later
      t(() => {
        boltTop.classList.add('retracted');
        boltBottom.classList.add('retracted');
        boltRight.classList.add('retracted');
      }, 350);
    }, 1300);

    // ── Step 3: Door swings open (2300ms) ──
    t(() => {
      doorWrapper.classList.add('opening');
    }, 2300);

    // ── Step 4: Camera zoom begins (3500ms) ──
    t(() => {
      vaultScreen.classList.add('zooming');
    }, 3500);

    // ── Step 5: Vault interior fades in (4000ms) ──
    t(() => {
      vaultInterior.classList.add('visible');
      statusBar.classList.add('visible');
    }, 4000);

    // ── Step 6: Logo glitch in (~2s after entering vault = 6000ms) ──
    t(() => {
      logoArea.classList.add('glitch-in');
    }, 6000);

    // ── Step 7: Logo glitch out (8200ms) ──
    t(() => {
      logoArea.classList.remove('glitch-in');
      logoArea.classList.add('glitch-out');
    }, 8200);

    // ── Step 8: Series nav appears (9500ms) ──
    t(() => {
      seriesNav.classList.add('visible');
    }, 9500);
  });
</script>
