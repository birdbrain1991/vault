<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VAULT</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0c1828; overflow: hidden; width: 100vw; height: 100vh; font-family: 'Share Tech Mono', monospace; }
canvas { display: block; width: 100%; height: 100%; }
#scanlines {
  position: fixed; inset: 0; pointer-events: none; z-index: 100;
  background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.1) 3px, rgba(0,0,0,0.1) 4px);
}
#click-hint {
  position: fixed; bottom: 10%; left: 50%; transform: translateX(-50%);
  font-size: 11px; letter-spacing: 5px; color: #00e5ff;
  animation: hpulse 2.2s ease-in-out infinite; text-shadow: 0 0 12px #00e5ff;
}
@keyframes hpulse { 0%,100%{opacity:.85} 50%{opacity:.1} }
#logo-area {
  position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
  text-align: center; width: 100%; opacity: 0; pointer-events: none;
}
#logo-text {
  font-family: 'Orbitron', monospace; font-weight: 900;
  font-size: clamp(30px,6.5vw,72px); letter-spacing: 8px;
  color: #b0c020; text-shadow: 0 0 22px #b0c020, 0 0 55px rgba(176,192,32,.38);
}
#logo-sub {
  margin-top: 10px; font-size: clamp(9px,1.3vw,13px);
  letter-spacing: 7px; color: rgba(176,192,32,.5); text-transform: uppercase;
}
#logo-area.glitch-in  { animation: glitchIn  1.8s cubic-bezier(.4,0,.2,1) forwards; }
#logo-area.glitch-out { animation: glitchOut 1.0s cubic-bezier(.4,0,.2,1) forwards; }
@keyframes glitchIn {
  0%  { opacity:0; clip-path:inset(50% 0 50% 0); transform:translate(-50%,-50%); }
  8%  { opacity:1; clip-path:inset(30% 0 40% 0); transform:translate(calc(-50% + 12px),-50%); filter:hue-rotate(80deg) brightness(2.2); }
  16% { clip-path:inset(0 0 0 0); transform:translate(calc(-50% - 8px),-50%); filter:none; }
  25% { clip-path:inset(15% 0 25% 0); transform:translate(calc(-50% + 5px),-50%); filter:hue-rotate(120deg); }
  33% { clip-path:inset(0 0 0 0); transform:translate(-50%,-50%); filter:none; }
  41% { opacity:0; }
  52% { opacity:1; clip-path:inset(8% 0 5% 0); transform:translate(calc(-50% + 3px),-50%); }
  62% { clip-path:inset(0 0 0 0); transform:translate(-50%,-50%); }
  78%,100% { opacity:1; clip-path:inset(0 0 0 0); transform:translate(-50%,-50%); filter:none; }
}
@keyframes glitchOut {
  0%  { opacity:1; clip-path:inset(0 0 0 0); transform:translate(-50%,-50%); }
  15% { clip-path:inset(25% 0 35% 0); transform:translate(calc(-50% + 15px),-50%); filter:hue-rotate(180deg) brightness(2); }
  32% { clip-path:inset(0 0 70% 0); transform:translate(calc(-50% - 10px),-50%); }
  52% { opacity:1; clip-path:inset(55% 0 0 0); transform:translate(calc(-50% + 6px),-50%); }
  72% { opacity:0; clip-path:inset(50% 0 50% 0); }
  100%{ opacity:0; }
}
#series-nav {
  position: fixed; top: 50%; left: 50%;
  transform: translate(-50%, -80px);
  display: flex; gap: clamp(14px,3vw,48px);
  opacity: 0; transition: opacity 1.1s ease-out; pointer-events: none;
}
#series-nav.visible { opacity:1; pointer-events:all; }
.series-item {
  display:flex; flex-direction:column; align-items:center; gap:12px;
  text-decoration:none; cursor:pointer;
  transition: transform .35s cubic-bezier(.4,0,.2,1);
}
.series-item:hover { transform:translateY(-9px); }
.series-box {
  width:clamp(88px,13vw,128px); height:clamp(88px,13vw,128px);
  border:1px solid rgba(176,192,32,.35); background:rgba(176,192,32,.04);
  display:flex; align-items:center; justify-content:center;
  position:relative; transition:border-color .3s, box-shadow .3s;
}
.series-item:hover .series-box {
  border-color:#b0c020;
  box-shadow: 0 0 28px rgba(176,192,32,.28), inset 0 0 22px rgba(176,192,32,.07);
}
.series-box::before,.series-box::after {
  content:''; position:absolute; width:14px; height:14px;
  border-color:#b0c020; border-style:solid; opacity:.5; transition:opacity .3s;
}
.series-box::before { top:-1px; left:-1px; border-width:2px 0 0 2px; }
.series-box::after  { bottom:-1px; right:-1px; border-width:0 2px 2px 0; }
.series-item:hover .series-box::before,
.series-item:hover .series-box::after { opacity:1; }
.series-placeholder { font-size:9px; letter-spacing:2px; color:rgba(176,192,32,.26); text-align:center; line-height:1.8; }
.series-label { font-size:11px; font-weight:700; letter-spacing:3px; color:rgba(176,192,32,.85); text-transform:uppercase; text-align:center; }
#status-bar {
  position:fixed; top:0; left:0; right:0; padding:10px 20px;
  font-size:10px; letter-spacing:3px; color:rgba(176,192,32,.38);
  display:flex; justify-content:space-between;
  opacity:0; transition:opacity 1s ease-out .4s; pointer-events:none;
}
#status-bar.visible { opacity:1; }
</style>
</head>

};

// ── LIGHTS ──
const ambLight  = new THREE.AmbientLight(0x0a1828, 0.65); scene.add(ambLight);

const gL1 = new THREE.PointLight(0x7ab818, 0, 12); gL1.position.set( 0,   3.8, -8.0); scene.add(gL1);

// ── HELPERS ──
function mk(geo, m, parent) {
  const mesh = new THREE.Mesh(geo, m);
  mesh.castShadow = mesh.receiveShadow = true;
  if (parent) parent.add(mesh);
  return mesh;
}
function lerp(a, b, t) { return a + (b - a) * t; }
function easeIO(t) { return t < 0.5 ? 2*t*t : -1+(4-2*t)*t; }
function easeOut3(t) { return 1 - Math.pow(1-t, 3); }

// ════════════════════════════════════════════
// WALL WITH CIRCULAR HOLE (door embedded in it)
// ════════════════════════════════════════════
const WALL_W = 24, WALL_H = 18;
const DOOR_R = 1.62; // radius of the hole (slightly larger than door disk)
const WALL_THICK = 0.9;

// Front face of wall — ShapeGeometry with hole
const wallShape = new THREE.Shape();
wallShape.moveTo(-WALL_W/2, -WALL_H/2);
wallShape.lineTo( WALL_W/2, -WALL_H/2);
wallShape.lineTo( WALL_W/2,  WALL_H/2);
wallShape.lineTo(-WALL_W/2,  WALL_H/2);
wallShape.closePath();
const holeShape = new THREE.Path();
holeShape.absarc(0, 0, DOOR_R, 0, Math.PI*2, true);
wallShape.holes.push(holeShape);

const wallGeoFront = new THREE.ShapeGeometry(wallShape, 48);
const wallFront = new THREE.Mesh(wallGeoFront, M.wallThick);
wallFront.position.set(0, 0, -0.05);
wallFront.receiveShadow = true;
scene.add(wallFront);

// Back face (same shape, flipped)
const wallGeoBack = new THREE.ShapeGeometry(wallShape, 48);
const wallBack = new THREE.Mesh(wallGeoBack, M.wallThick);
wallBack.position.set(0, 0, -WALL_THICK);
wallBack.rotation.y = Math.PI;
wallBack.receiveShadow = true;
scene.add(wallBack);

// Tunnel (the circular throat connecting front to back of wall)
// Use a cylinder with BackSide to form the inside of the tunnel ring
const tunnelGeo = new THREE.CylinderGeometry(DOOR_R, DOOR_R, WALL_THICK, 52, 1, true);
const tunnel = new THREE.Mesh(tunnelGeo, M.tunnelWall);

tunnel.position.set(0, 0, -WALL_THICK/2);
scene.add(tunnel);

// Wall top/bottom/side slabs (to give wall thickness on visible edges)
const slabMat = M.wallThick;

// bottom slab
const slabBot = mk(new THREE.BoxGeometry(WALL_W, WALL_THICK, 0.06), slabMat);

// left slab

// right slab

// ════════════════════════════════════════════
// DOOR FRAME (sits in the wall opening)

function addBar(parent, geo, m, x, y, z) {
  const mesh = mk(geo, m);
  mesh.position.set(x, y, z);
  parent.add(mesh);
  return mesh;
}

addBar(frameG, new THREE.BoxGeometry(FW*2+FT*2, FT, FD), M.metal,  0,  FH+FT/2, -WALL_THICK/2);
addBar(frameG, new THREE.BoxGeometry(FW*2+FT*2, FT, FD), M.metal,  0, -FH-FT/2, -WALL_THICK/2);

addBar(frameG, new THREE.BoxGeometry(FT, FH*2+FT*2, FD), M.metal,  FW+FT/2, 0,  -WALL_THICK/2);

addBar(frameG, new THREE.BoxGeometry(0.26, cH*1.05, cD*1.05), M.channel,  0,  FH+FT/2, -WALL_THICK/2+0.07);

addBar(frameG, new THREE.BoxGeometry(cH*1.05, 0.26, cD*1.05), M.channel,  FW+FT/2, 0,  -WALL_THICK/2+0.07);

[-1.3, 1.3].forEach(hy => {
  const hg = new THREE.Group();
  hg.position.set(-FW - FT*0.55, hy, -WALL_THICK/2+0.05);

// ── HINGE PIVOT → DOOR ──
const hingePivot = new THREE.Group();

// Concentric ring details on front
[1.23, 0.82].forEach((r, i) => {

// Alarm overlay

// ── BOLTS ──
const boltG = {};
function makeBolt(key, bx, by, horiz) {
  const g = new THREE.Group();
  g.position.set(bx, by, 0.1);
  const shaft = new THREE.Mesh(new THREE.CylinderGeometry(0.11,0.11,0.76,10), M.bolt);
  const cap   = new THREE.Mesh(new THREE.CylinderGeometry(0.155,0.155,0.1,10), M.metalBrt);
  if (horiz) {
    shaft.rotation.z = cap.rotation.z = Math.PI/2;
    shaft.position.x = 0.16; cap.position.x = 0.52;
  } else {
    const s = by > 0 ? 1 : -1;
    shaft.position.y = 0.16*s; cap.position.y = 0.52*s;
  }
  g.add(shaft, cap);
  doorMG.add(g);
  boltG[key] = g;
}
makeBolt('top',    0,   1.68, false);
makeBolt('bottom', 0,  -1.68, false);
makeBolt('right',  1.68, 0,   true);

// ── WHEEL ──
const wheelG = new THREE.Group();
wheelG.position.set(0, 0, 0.16);
doorMG.add(wheelG);
wheelG.add(mk(new THREE.TorusGeometry(0.48, 0.058, 10, 36), M.metalBrt));
for (let i = 0; i < 4; i++) {

// ════════════════════════════════════════════
// SHORT CORRIDOR  (wall back → vault entrance)

const CW = 3.5, CH = 3.2, CD = 3.5;

// Ceiling, floor, left, right of corridor
const corrMat = new THREE.MeshPhongMaterial({ color:0x070d10, specular:0x060a0c, shininess:3, side:THREE.DoubleSide });
[
  { g: new THREE.PlaneGeometry(CW, CD), pos:[0,  CH/2, corrZ], rx:-Math.PI/2 },
  { g: new THREE.PlaneGeometry(CW, CD), pos:[0, -CH/2, corrZ], rx: Math.PI/2 },

].forEach(({ g, pos, rx, ry }) => {

// Dim corridor light

// ════════════════════════════════════════════
// VAULT INTERIOR (starts behind corridor)
// ════════════════════════════════════════════
const intG = new THREE.Group();
const VAULT_Z_OFFSET = -(WALL_THICK + CD + 0.5);
intG.position.set(0, 0, VAULT_Z_OFFSET);
scene.add(intG);

const VW=6.5, VH=3.6, VD=11;

function addPlane(geo, m, x, y, z, rx, ry) {
  const mesh = new THREE.Mesh(geo, m);
  mesh.position.set(x, y, z);
  if (rx) mesh.rotation.x = rx;
  if (ry) mesh.rotation.y = ry;
  mesh.receiveShadow = true;
  intG.add(mesh);
}

addPlane(new THREE.PlaneGeometry(VW*2, VH*2), M.wall,   0, 0,   -VD,          0,        0);
addPlane(new THREE.PlaneGeometry(VW*2, VD),   M.floor,  0, -VH, -VD/2, -Math.PI/2, 0);
addPlane(new THREE.PlaneGeometry(VW*2, VD),   M.wall,   0,  VH, -VD/2,  Math.PI/2, 0);
addPlane(new THREE.PlaneGeometry(VD,   VH*2), M.wall,  -VW, 0,  -VD/2,  0,  Math.PI/2);
addPlane(new THREE.PlaneGeometry(VD,   VH*2), M.wall,   VW, 0,  -VD/2,  0, -Math.PI/2);

// Floor grid
for (let i = 0; i <= 8; i++) {
  const x = -VW + (i/8)*VW*2;
  const line = mk(new THREE.BoxGeometry(0.025, 0.01, VD), M.gridLine);
  line.position.set(x, -VH+0.01, -VD/2);
  intG.add(line);
}
for (let j = 0; j <= 7; j++) {
  const z = -(j/7)*VD;
  const line = mk(new THREE.BoxGeometry(VW*2, 0.01, 0.025), M.gridLine);
  line.position.set(0, -VH+0.01, z);
  intG.add(line);
}

// ── CRATES ──
function makeCrate(w, h, d, x, y, z, led) {
  const g = new THREE.Group();
  g.position.set(x, y, z);
  const body = mk(new THREE.BoxGeometry(w,h,d), M.crate);
  body.castShadow = body.receiveShadow = true;
  g.add(body);
  [h/2, -h/2].forEach(ey => {
    const s = mk(new THREE.BoxGeometry(w+0.01, 0.04, d+0.01), M.crateEdge);
    s.position.y = ey; g.add(s);
  });
  [-w/2, w/2].forEach(ex => {
    const s = mk(new THREE.BoxGeometry(0.04, h, 0.04), M.crateEdge);
    s.position.set(ex, 0, d/2); g.add(s);
  });
  const diagLen = Math.sqrt(w*w + h*h);
  [-Math.atan2(h,w), Math.atan2(h,w)].forEach(a => {
    const b = mk(new THREE.BoxGeometry(diagLen*0.97, 0.026, 0.018), M.crateEdge);
    b.rotation.z = a; b.position.z = d/2+0.01; g.add(b);
  });
  if (led) {
    const dot = mk(new THREE.SphereGeometry(0.04,8,6), M.crateLED);
    dot.position.set(w/2-0.13, h/2-0.13, d/2+0.02); g.add(dot);
  }
  intG.add(g);
}

const FY = -VH;
makeCrate(1.15, 0.95, 0.92, -5.0, FY+0.48, -1.8, true);
makeCrate(1.55, 1.25, 1.05, -4.6, FY+0.63, -3.6, false);
makeCrate(0.82, 0.82, 0.82, -3.6, FY+0.41, -2.2, true);
makeCrate(0.92, 1.45, 0.85, -5.2, FY+0.73, -2.1, false);
makeCrate(1.35, 0.75, 1.15, -4.2, FY+0.38, -5.4, false);
makeCrate(0.75, 1.15, 0.72, -3.3, FY+0.58, -5.0, true);
makeCrate(1.05, 0.88, 0.90, -5.5, FY+0.44, -6.8, false);
makeCrate(1.22, 1.02, 0.92,  4.8, FY+0.51, -2.0, true);
makeCrate(0.92, 0.82, 0.92,  5.1, FY+0.41, -3.4, false);
makeCrate(1.05, 1.55, 0.82,  4.0, FY+0.78, -2.6, false);
makeCrate(1.45, 0.92, 1.05,  4.8, FY+0.46, -5.2, true);
makeCrate(0.82, 0.72, 0.72,  3.6, FY+0.36, -5.7, false);
makeCrate(0.95, 1.05, 0.88,  5.3, FY+0.53, -7.0, true);
makeCrate(1.85, 1.05, 1.25,  1.5, FY+0.53, -8.2, false);
makeCrate(1.05, 1.65, 0.95, -1.8, FY+0.83, -8.5, true);
makeCrate(0.92, 0.92, 0.92,  0.2, FY+0.46, -9.0, false);
makeCrate(1.30, 0.70, 1.10, -0.5, FY+0.35, -7.0, false);

// ── ANIMATION STATE ──
let state = 'idle', activated = false;
let alarmT=0, unlockP=0, boltP=0, doorP=0, zoomP=0, elapsed=0;

const camA = new THREE.Vector3(0, 0.0,  5.6);
const camB = new THREE.Vector3(0, 0.3, -5.5);
const lkA  = new THREE.Vector3(0, 0,   0);
const lkB  = new THREE.Vector3(0, 0,  -12);
const lkT  = new THREE.Vector3();

// ── CLICK ──
const clickHint = document.getElementById('click-hint');
const logoArea  = document.getElementById('logo-area');
const seriesNav = document.getElementById('series-nav');
const statusBar = document.getElementById('status-bar');
const after = (fn, ms) => setTimeout(fn, ms);

canvas.addEventListener('click', () => {
  if (activated) return;
  activated = true;
  clickHint.style.display = 'none';
  state = 'alarm';
  after(() => {
    state = 'unlock';
    after(() => { state = 'bolts';   },  420);
    after(() => { state = 'opening'; }, 1250);
    after(() => { state = 'zooming'; }, 2600);
    after(() => { state = 'interior'; statusBar.classList.add('visible'); }, 3600);
    after(() => { logoArea.classList.add('glitch-in'); }, 5200);
    after(() => { logoArea.classList.remove('glitch-in'); logoArea.classList.add('glitch-out'); }, 7400);
    after(() => { seriesNav.classList.add('visible'); }, 8700);
  }, 1450);
});

// ── RENDER ──
const clock = new THREE.Clock();
renderer.setAnimationLoop(() => {
  const dt = clock.getDelta();
  elapsed += dt;

  if (state === 'idle') {
    const p = (Math.sin(elapsed*1.4)+1)*0.5;
    cyanLight.intensity = 2.0 + p*0.8;
    pinkLight.intensity = 1.6 + p*0.6;
    wheelG.rotation.z   = Math.sin(elapsed*0.38)*0.025;
  }

  if (state === 'alarm') {
    alarmT += dt*9.5;
    const f = (Math.sin(alarmT)+1)*0.5;
    M.alarm.opacity     = f*0.68;
    redLight.intensity  = f*9.0;
    cyanLight.intensity = lerp(2.5, 0.2, f);
    pinkLight.intensity = lerp(2.0, 0.1, f);
  } else if (state !== 'idle') {
    M.alarm.opacity    = Math.max(0, M.alarm.opacity    - dt*4);
    redLight.intensity = Math.max(0, redLight.intensity - dt*12);
  }

  if (state === 'unlock' || state === 'bolts') {
    unlockP = Math.min(1, unlockP + dt*2.5);
    wheelG.rotation.z = easeIO(unlockP) * Math.PI * 2;
  }

  if (state === 'bolts' || state === 'opening') {
    boltP = Math.min(1, boltP + dt*1.4);
    const r = easeOut3(boltP);
    boltG.top.position.y    = lerp( 1.68,  1.28, r);
    boltG.bottom.position.y = lerp(-1.68, -1.28, r);
    boltG.right.position.x  = lerp( 1.68,  1.28, r);
  }

  if (state === 'opening' || state === 'zooming') {
    doorP = Math.min(1, doorP + dt*0.7);
    hingePivot.rotation.y = lerp(0, -Math.PI*0.72, easeIO(doorP));
  }

  if (state === 'zooming' || state === 'interior') {
    zoomP = Math.min(1, zoomP + dt*0.45);
    const z = easeIO(zoomP);
    camera.position.lerpVectors(camA, camB, z);
    lkT.lerpVectors(lkA, lkB, z);
    camera.lookAt(lkT);

    const iI = easeOut3(zoomP);
    gL1.intensity      = lerp(0, 2.8, iI);
    gL2.intensity      = lerp(0, 2.0, iI);
    gL3.intensity      = lerp(0, 1.6, iI);
    gL4.intensity      = lerp(0, 1.1, iI);
    ceilSpot.intensity = lerp(0, 3.2, iI);
    corrLight.intensity= lerp(0, 1.4, Math.min(1, zoomP*2));

    cyanLight.intensity = lerp(2.4, 0.05, z);
    pinkLight.intensity = lerp(1.9, 0.04, z);
    ambLight.intensity  = lerp(0.65, 0.22, z);
  }

  if (state === 'interior') {
    const flk = 1 + Math.sin(elapsed*0.68)*0.055 + Math.sin(elapsed*2.1)*0.025;
    gL1.intensity      = 2.8*flk;
    gL2.intensity      = 2.0*flk;
    ceilSpot.intensity = 3.2*(1 + Math.sin(elapsed*1.05)*0.038);
  }

  renderer.render(scene, camera);
});
